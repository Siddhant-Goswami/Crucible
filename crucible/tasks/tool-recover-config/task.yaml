id: tool-recover-config
tier: T1
domain: software-engineering
capability_tags: [tool-use, recovery, error-handling]
budgets:
  max_iters: 6
  max_tokens: 120000
  wall_timeout_s: 600
policy:
  allow_globs: ["config/**", "out/**"]
  forbid_globs: ["secrets/**", "export.js"]
  allow_cmds: [node, mkdir, ls, cat]
  forbid_cmds: [wget, ssh, nc]
oracle:
  type: tests
  partial_credit: true
seeds: [1, 2, 3]
